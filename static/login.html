<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign In - Remote Control</title>
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
        <script type="module" src="/js/pages/login.ts"></script>
    </head>
    <body class="min-h-screen flex flex-col items-center justify-center bg-zinc-950 text-zinc-100 p-4">
        <div class="w-full max-w-[360px] animate-in fade-in duration-500">
            <!-- Header -->
            <div class="flex flex-col items-center text-center mb-8">
                <div
                    class="w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 flex items-center justify-center mb-4"
                >
                    <svg class="w-5 h-5 text-zinc-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                    </svg>
                </div>
                <h1 class="text-xl font-medium tracking-tight">Remote Control</h1>
                <p class="text-zinc-500 text-sm mt-1">Sign in to access host.</p>
            </div>

            <!-- Card -->
            <div
                id="loginCard"
                class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-sm transition-all duration-300"
            >
                <!-- Error Message -->
                <div
                    id="errorBox"
                    class="hidden mb-4 p-3 rounded-md bg-red-950/50 border border-red-900/50 flex items-start gap-2"
                >
                    <svg
                        class="w-4 h-4 text-red-500 shrink-0 mt-0.5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                        />
                    </svg>
                    <div>
                        <p id="errorMessage" class="text-red-400 text-sm font-medium">Invalid credentials.</p>
                    </div>
                </div>

                <form id="loginForm" class="space-y-4" method="POST">
                    <div class="space-y-1.5">
                        <label for="password" class="text-sm font-medium text-zinc-300">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            required
                            class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-md text-zinc-100 focus:border-zinc-500 transition-colors sm:text-sm"
                            placeholder="••••••••"
                        />
                    </div>

                    <button
                        type="submit"
                        id="submitBtn"
                        class="w-full mt-2 py-2 px-4 bg-zinc-100 hover:bg-white text-zinc-900 font-medium rounded-md transition-colors flex items-center justify-center gap-2"
                    >
                        <span id="btnText">Sign in</span>
                        <div
                            id="btnSpinner"
                            class="hidden w-4 h-4 border-2 border-zinc-900/30 border-t-zinc-900 rounded-full animate-spin"
                        ></div>
                    </button>
                </form>
            </div>
        </div>
    </body>
</html>
