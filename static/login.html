<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Security Clearance</title>
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
        <script type="module" src="/js/login.js"></script>
    </head>
    <body class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <!-- Decorative Background Elements -->
        <div class="fixed inset-0 pointer-events-none">
            <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-blue-900/10 to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-blue-900/10 to-transparent"></div>
            <!-- Animated grid lines -->
            <div class="absolute top-1/2 left-0 w-full h-[1px] bg-blue-500/10"></div>
            <div class="absolute top-0 left-1/2 h-full w-[1px] bg-blue-500/10"></div>
        </div>

        <!-- Login Container -->
        <div class="w-full max-w-md p-4 relative z-10">
            <!-- Header / Logo -->
            <div class="text-center mb-8 animate-in slide-in-from-bottom-4 duration-500">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-black/40 border border-blue-500/30 mb-4 shadow-[0_0_30px_rgba(37,99,235,0.2)]"
                >
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="1.5"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight font-[Space_Grotesk]">
                    NEXUS <span class="text-blue-500">CONTROL</span>
                </h1>
                <p class="text-gray-500 font-mono text-xs mt-2 tracking-[0.2em] uppercase">
                    Restricted Access // Level 5
                </p>
            </div>

            <!-- Card -->
            <div
                id="loginCard"
                class="glass-card rounded-2xl p-8 animate-in zoom-in-95 duration-500 delay-100 relative group"
            >
                <div class="scan-line"></div>

                <!-- Error Message Display -->
                <div
                    id="errorBox"
                    class="hidden mb-6 p-3 rounded bg-red-500/10 border border-red-500/20 flex items-start gap-3"
                >
                    <svg
                        class="w-5 h-5 text-red-400 shrink-0 mt-0.5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                        />
                    </svg>
                    <div class="flex-1">
                        <h4 class="text-red-400 font-bold text-xs uppercase tracking-wider font-mono">
                            Authentication Failed
                        </h4>
                        <p id="errorMessage" class="text-gray-400 text-sm mt-0.5">Invalid credentials provided.</p>
                    </div>
                </div>

                <form id="loginForm" class="space-y-6" method="POST">
                    <!-- Username -->
                    <div class="login-input-group space-y-2">
                        <label
                            class="text-xs font-bold text-gray-500 uppercase tracking-widest font-mono transition-colors"
                            >Identity</label
                        >
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-gray-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        stroke-linecap="round"
                                        stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                                    />
                                </svg>
                            </span>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                autocomplete="username"
                                required
                                autofocus
                                class="w-full pl-12 pr-4 py-3 bg-black/50 border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono text-sm"
                                placeholder="USER_ID"
                            />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="login-input-group space-y-2">
                        <label
                            class="text-xs font-bold text-gray-500 uppercase tracking-widest font-mono transition-colors"
                            >Access Key</label
                        >
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-gray-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        stroke-linecap="round"
                                        stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                                    />
                                </svg>
                            </span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                autocomplete="current-password"
                                required
                                class="w-full pl-12 pr-4 py-3 bg-black/50 border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono text-sm"
                                placeholder="••••••••"
                            />
                        </div>
                    </div>

                    <button
                        type="submit"
                        id="submitBtn"
                        class="group w-full py-3.5 px-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-all duration-200 shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] flex items-center justify-center gap-2 relative overflow-hidden"
                    >
                        <div
                            class="absolute inset-0 w-full h-full bg-linear-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1s_infinite]"
                        ></div>
                        <span class="font-[Space_Grotesk] tracking-wider" id="btnText">AUTHENTICATE</span>
                        <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>

                        <!-- Loading Spinner (Hidden by default) -->
                        <div
                            id="btnSpinner"
                            class="hidden h-5 w-5 border-2 border-white/30 border-t-white rounded-full animate-spin"
                        ></div>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8 text-gray-600 font-mono text-[10px] animate-in fade-in duration-700 delay-300">
                SECURE CONNECTION ESTABLISHED<br />
                ENCRYPTION: AES-256-GCM
            </div>
        </div>
    </body>
</html>
